version: '3.8'

services:
  payment-service:
    # Build from Dockerfile in current directory
    build: .

    # Name the container
    container_name: payment-service

    # Map host port 8000 to container port 8000
    # Format: host:container
    ports:
      - "8000:8000"

    # Pass environment variables from .env file
    # API key stays in .env — never hardcoded
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}

    # Restart policy
    # unless-stopped = restart on crash but not on manual stop
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s