apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: production
  labels:
    app: payment-service

data:
  APP_ENV: "production"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"

  # Service configuration
  MAX_PAYMENT_AMOUNT: "1000000"
  PAYMENT_TIMEOUT_SECONDS: "30"
  RETRY_MAX_ATTEMPTS: "3"

  # Feature flags
  ENABLE_FRAUD_CHECK: "true"
  ENABLE_NOTIFICATIONS: "true"

  # External service URLs (non-sensitive)
  NOTIFICATION_SERVICE_URL: "http://notification-service/api/v1"
  AUDIT_SERVICE_URL: "http://audit-service/api/v1"