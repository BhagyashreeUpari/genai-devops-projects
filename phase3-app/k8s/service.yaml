# service.yaml
# Exposes your pods so they can be accessed
# NodePort makes it accessible from outside the cluster
# Load balances traffic across all healthy pods

apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: default
  labels:
    app: payment-service

spec:
  # NodePort exposes service on each node's IP
  # at a static port (30000-32767)
  # Use this for local development with Minikube
  type: NodePort

  # Routes traffic to pods with this label
  selector:
    app: payment-service

  ports:
  - name: http
    protocol: TCP
    port: 80           # service port (inside cluster)
    targetPort: 8000   # pod port (your app)
    nodePort: 30080    # external port (access from laptop)